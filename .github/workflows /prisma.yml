name: Prisma Twistcli Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Display runner information
      - name: Show Runner Information
        run: |
          echo "Runner Name: $RUNNER_NAME"
          echo "Operating System: $RUNNER_OS"

      # Build the Docker image
      - name: Build Docker Image
        run: |
          docker build -t demo-app:latest .

      # Verify the Docker image
      - name: List Docker Images
        run: |
          docker images

      # Download Twistcli
      - name: Download Twistcli
        run: |
          curl --progress-bar -L \
            --header "authorization: Bearer ${{ secrets.PRISMA_TOKEN }}" \
            "${{ secrets.PRISMA_CONSOLE_URL }}/api/v1/util/twistcli" \
            -o twistcli

          chmod +x twistcli

      # Verify Twistcli installation
      - name: Verify Twistcli
        run: |
          ./twistcli --version

      # Scan the Docker image
      - name: Scan Docker Image
        run: |
          ./twistcli images scan \
            --address "${{ secrets.PRISMA_CONSOLE_URL }}" \
            --token "${{ secrets.PRISMA_TOKEN }}" \
            demo-app:latest

      # Pipeline completed
      - name: Pipeline Finished
        run: |
          echo "Prisma Twistcli scan completed successfully!"
